# TODO(P1): JWT 鉴权已接入;限流过滤器待 P2。
spring:
  application:
    name: sellm-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${SELLM_NACOS_ADDR:127.0.0.1:8848}
    gateway:
      routes:
        # backend 单体(assessment)尚未接入 Nacos，保留直连 http://localhost:8080
        - id: agent-assessment
          uri: http://localhost:8080
          predicates:
            - Path=/api/auth/**,/api/orgs/**,/api/classes/**,/api/children/**,/api/scales/**,/api/reports/**,/api/ieps/**,/api/family-ieps/**,/api/assessments/**,/api/users/**
        - id: agent-teaching
          uri: lb://agent-teaching
          predicates:
            - Path=/api/teaching/**
        - id: agent-research
          uri: lb://agent-research
          predicates:
            - Path=/api/research/**
        - id: agent-aids
          uri: lb://agent-aids
          predicates:
            - Path=/api/aids/**
        - id: agent-qa
          uri: lb://agent-qa
          predicates:
            - Path=/api/qa/**

# 端口分配:gateway 8888 | assessment 8080 | teaching 8081 | research 8082 | aids 8083 | qa 8084 | minio 9000/9001
server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,gateway

sellm:
  gateway:
    jwt:
      secret: ${SELLM_JWT_SECRET:dev-jwt-secret-key-at-least-32-bytes-long-0123456789}
      whitelist:
        - /api/auth/
        - /actuator/health
