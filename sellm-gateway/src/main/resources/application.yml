spring:
  application:
    name: sellm-gateway
  cloud:
    gateway:
      routes:
        - id: agent-assessment
          uri: http://localhost:8080
          predicates:
            - Path=/api/assessment/**,/api/auth/**,/api/admin/**
        - id: agent-teaching
          uri: http://localhost:8081
          predicates:
            - Path=/api/teaching/**
        - id: agent-research
          uri: http://localhost:8082
          predicates:
            - Path=/api/research/**
        - id: agent-aids
          uri: http://localhost:8083
          predicates:
            - Path=/api/aids/**
        - id: agent-qa
          uri: http://localhost:8084
          predicates:
            - Path=/api/qa/**

server:
  port: 9000

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
