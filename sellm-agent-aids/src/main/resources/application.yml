spring:
  application:
    name: agent-aids
  cloud:
    nacos:
      discovery:
        server-addr: ${SELLM_NACOS_ADDR:127.0.0.1:8848}
  datasource:
    # 生产用独立 MySQL 库(aids);dev 联调走 application-dev.yml 的 H2 文件库。
    url: ${SELLM_AIDS_DB_URL:jdbc:mysql://localhost:3306/sellm_aids?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4}
    username: ${SELLM_AIDS_DB_USER:root}
    password: ${SELLM_AIDS_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never   # 生产不自动建表/种子(H2 MERGE 方言不兼容 MySQL,由迁移脚本);dev profile 覆盖为 always

mybatis:
  mapper-locations: classpath*:mybatis/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health

sellm:
  smart-layer:
    base-url: ${SELLM_SMARTLAYER_URL:http://localhost:8090}
    timeout-seconds: ${SELLM_SMARTLAYER_TIMEOUT:30}
  storage:
    local-dir: ${SELLM_STORAGE_LOCAL_DIR:data/media}
