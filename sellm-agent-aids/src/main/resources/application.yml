spring:
  application:
    name: agent-aids
  cloud:
    nacos:
      discovery:
        server-addr: ${SELLM_NACOS_ADDR:127.0.0.1:8848}
  datasource:
    url: jdbc:h2:mem:aids_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8            # 种子含中文教具文案,须 UTF-8 读取(否则 Windows 默认 GBK 入库即乱码)
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath*:mybatis/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health

sellm:
  smart-layer:
    base-url: ${SELLM_SMARTLAYER_URL:http://localhost:8090}
    timeout-seconds: ${SELLM_SMARTLAYER_TIMEOUT:30}
  storage:
    local-dir: ${SELLM_STORAGE_LOCAL_DIR:data/media}
