# dev profile:本地联调用 H2 文件库,覆盖主 yml 的 MySQL。
# schema.sql 含中文教具种子(MERGE),须 UTF-8 读取。
spring:
  datasource:
    url: jdbc:h2:file:./data/aids_dev;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      continue-on-error: true
