spring:
  datasource:
    url: jdbc:h2:file:./data/asd_dev;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8            # 种子脚本用 UTF-8 读取(否则 Windows 平台默认 GBK 会乱码中文量表文案)
      schema-locations: classpath:schema.sql
      data-locations: classpath:seed-dev.sql
      continue-on-error: true   # 种子幂等(重复启动时 INSERT 冲突忽略)
  h2:
    console:
      enabled: true             # /h2-console 便于调试(dev only)
  cloud:
    nacos:
      discovery:
        server-addr: ${SELLM_NACOS_ADDR:127.0.0.1:8848}
        # dev 默认关闭服务注册:单进程 H2 联调无需 Nacos,避免无 Nacos 时启动失败(Connection refused)。
        # 需在 dev 验证网关路由时,起 Nacos 后设 SELLM_NACOS_ENABLED=true 即可恢复注册。
        enabled: ${SELLM_NACOS_ENABLED:false}
        # dev 单机:强制注册回环 IP,否则注册物理网卡 IP,换网/IP 变更后网关 lb 转发到死 IP → 500。
        ip: ${SELLM_NACOS_IP:127.0.0.1}
    service-registry:
      auto-registration:
        enabled: ${SELLM_NACOS_ENABLED:false}

mybatis:
  mapper-locations: classpath*:mybatis/*.xml
  configuration:
    map-underscore-to-camel-case: true

sellm:
  crypto:
    aes-key: "dev-aes-key-32bytes-0123456789ab"   # 恰 32 字节(dev 用)
  jwt:
    secret: "dev-jwt-secret-key-at-least-32-bytes-long-0123456789"
    expiration-minutes: 240
  ai:
    provider: mock   # dev 默认 Mock,不外联
  pdf:
    font-path: ${SELLM_PDF_FONT_PATH:C:/Windows/Fonts/simhei.ttf}   # dev 默认黑体;环境变量可覆盖
  minio:
    provider: noop   # dev 默认本地落盘,不连 MinIO
    local-dir: data/media
  multimodal:
    provider: mock   # dev 默认 Mock,不外联(图像 PII 红线)
